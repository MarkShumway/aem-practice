<!--/* Weather Widget Component */-->
<sly data-sly-use.model="com.myaem.core.models.WeatherModel"/>
<div class="cmp-weather"
     data-api-key="${model.apiKey @ context='attribute'}"
     data-unit="${model.temperatureUnit @ context='attribute'}"
     data-symbol="${model.temperatureSymbol @ context='attribute'}">
    <h3 class="cmp-weather__title">${model.widgetTitle @ context='text'}</h3>
    <div class="cmp-weather__search">
        <label>
            <input
                type="text"
                class="cmp-weather__input"
                placeholder="Search for a city..."
                autocomplete="off"/>
        </label>
        <ul class="cmp-weather__suggestions"></ul>
    </div>

    <div class="cmp-weather__result" hidden>
        <div class="cmp-weather__city"></div>
        <div class="cmp-weather__temp"></div>
        <div class="cmp-weather__description"></div>
        <img class="cmp-weather__icon" src="" alt=""/>
    </div>

    <div class="cmp-weather__error" hidden>
        Unable to load weather data.
    </div>
</div>
